name: Render sector charts
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 13-21 * * 1-5"
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install matplotlib numpy
      - run: python render_sectors.py
      - run: |
          git config user.name "vvp-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "Update charts" || echo "no changes"
          git push
